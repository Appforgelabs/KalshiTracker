name: KalshiTracker Daily Pipeline

on:
  schedule:
    # Run every day at 06:00 UTC (2 AM ET)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Generate dashboard data
        env:
          KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python3 scripts/generate_dashboard.py

      - name: Copy dashboard_data.json to repo root for Pages
        run: |
          cp ../kalshi/data/dashboard_data.json . 2>/dev/null || \
          cp kalshi/data/dashboard_data.json . 2>/dev/null || \
          echo "Warning: Could not copy dashboard_data.json"

      - name: Commit and push updated data
        run: |
          git config user.email "luka@appforgelabs.com"
          git config user.name "Luka (KalshiTracker Bot)"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Auto-update dashboard data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: generate-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
